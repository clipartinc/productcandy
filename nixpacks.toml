# Railway / Nixpacks config — only consulted when this app is built on
# Railway (or any other Nixpacks-using platform). Local dev (`npm run dev`)
# is unaffected.

[phases.setup]
nixPkgs = ["nodejs_22", "npm-10_x"]

[phases.install]
cmds = ["npm ci --legacy-peer-deps"]

[phases.build]
cmds = ["npx prisma generate", "npx next build"]

# Node ran the build OOM on Railway's smaller plans before this — give it
# enough headroom for Next.js 16 + Tiptap + sharp without burning through
# the container's memory cap.
[variables]
NODE_OPTIONS = "--max-old-space-size=1024"
NEXT_TELEMETRY_DISABLED = "1"
