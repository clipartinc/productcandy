# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "706652ab86a2ead73ca0e780fe466246"
name = "Product Candy"
application_url = "https://productcandy.app/app"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_files,write_files,read_products,write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://productcandy.app/api/auth/callback" ]

[webhooks]
api_version = "2026-04"

# App proxy — lets storefronts fetch from
# https://{shop}.myshopify.com/apps/product-candy/snippets/:id
# which Shopify rewrites to https://productcandy.app/api/proxy/snippets/:id
# with shop + signature query params we verify server-side. Used by the
# Snippet App Block in extensions/snippet-block to render saved snippets
# without going through the theme's rte-formatter.
[app_proxy]
url = "https://productcandy.app/api/proxy"
subpath = "product-candy"
prefix = "apps"
