# This file is overwritten by `npx shopify app config link`, which discovers
# the existing "Product Candy" app from your Partner account and fills in
# the real client_id, application_url, and other fields.
#
# Run once: npx shopify app config link
#
# After that, never edit by hand — use `npx shopify app config push` to sync.

client_id = "REPLACE_VIA_SHOPIFY_APP_CONFIG_LINK"
name = "Product Candy"
handle = "product-candy"
application_url = "https://productcandy.app/app"
embedded = true

[build]
include_config_on_deploy = true

[access_scopes]
scopes = "read_products,write_products,read_files,write_files"

[auth]
redirect_urls = [
  "https://productcandy.app/api/auth/callback"
]

[webhooks]
api_version = "2026-01"

[pos]
embedded = false
