# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "706652ab86a2ead73ca0e780fe466246"
name = "Product Candy"
application_url = "https://productcandy.app/app"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_files,write_files,read_products,write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://productcandy.app/api/auth/callback" ]

[webhooks]
api_version = "2026-04"

  # Custom Snippets billing — keeps shop.subscriptionStatus in sync when
  # a merchant cancels / expires / re-accepts the $4.99/mo subscription
  # via Shopify admin instead of through our embedded billing page.
  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/api/webhooks/app-subscriptions"

  # GDPR + lifecycle. shop/redact must be implemented for App Store
  # submission; app/uninstalled is best-practice so we can stop the
  # paywall checks immediately and clean up cached billing state.
  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/api/webhooks/app-uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "shop/redact" ]
  uri = "/api/webhooks/shop-redact"
  compliance_topics = [ "shop/redact" ]

  [[webhooks.subscriptions]]
  topics = [ "customers/data_request" ]
  uri = "/api/webhooks/customers-data-request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  topics = [ "customers/redact" ]
  uri = "/api/webhooks/customers-redact"
  compliance_topics = [ "customers/redact" ]

# App proxy — lets storefronts fetch from
# https://{shop}.myshopify.com/apps/product-candy/snippets/:id
# which Shopify rewrites to https://productcandy.app/api/proxy/snippets/:id
# with shop + signature query params we verify server-side. Used by the
# Snippet App Block in extensions/snippet-block to render saved snippets
# without going through the theme's rte-formatter.
[app_proxy]
url = "https://productcandy.app/api/proxy"
subpath = "product-candy"
prefix = "apps"
